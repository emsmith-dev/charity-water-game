<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charity:Water Game</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <div id="game-container">
        <div id="difficulty-select-container" style="text-align:center; margin-bottom:10px;">
            <label for="difficulty-select"><strong>Difficulty:</strong></label>
            <select id="difficulty-select">
                <option value="easy">Easy</option>
                <option value="normal" selected>Normal</option>
                <option value="hard">Hard</option>
            </select>
        </div>
        <header>
            <h1>Charity:Water - Droplet Sort</h1>
            <p>Swipe droplets into the correct bucket before time runs out!</p>
        </header>
        <div id="score-timer">
            <span id="score">Score: 0</span>
            <span id="timer">Time: 30</span>
        </div>
        <div id="buckets">
            <div id="clean-bucket" class="bucket">
                <img src="assets/jerrycan-yellow.svg" alt="Clean Jerry Can" class="jerrycan">
                <span class="bucket-label">Clean Water</span>
            </div>
            <div id="dirty-bucket" class="bucket">
                <img src="assets/jerrycan-yellow.svg" alt="Dirty Jerry Can" class="jerrycan">
                <span class="bucket-label">Dirty Water</span>
            </div>
        </div>
        <canvas id="droplet-canvas"></canvas>
        <div id="game-over" style="display:none;">
            <h2>Game Over!</h2>
            <p id="final-score"></p>
            <button onclick="startGame()">Play Again</button>
        </div>
    </div>
    <audio id="splash-sound" src="assets/splash.mp3" preload="auto"></audio>
    <script src="assets/game.js"></script>
</body>
</html>
